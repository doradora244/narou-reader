<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読書</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-logo">📖 小説リーダー</a>
  </div>
</header>

<main class="main-content">
  <div class="breadcrumb">
    <a href="index.html">トップ</a>
    <span class="breadcrumb-sep">›</span>
    <a id="breadcrumb-novel" href="#">小説</a>
    <span class="breadcrumb-sep">›</span>
    <span id="breadcrumb-chapter">第?話</span>
  </div>

  <div class="reading-layout">
    <div id="reading-settings" class="reading-settings" style="display:none">
      <span class="setting-label">文字サイズ：</span>
      <div class="font-size-controls">
        <button class="setting-btn" id="font-down">－</button>
        <span class="font-size-display" id="font-size-display">標準</span>
        <button class="setting-btn" id="font-up">＋</button>
      </div>
      <span class="setting-label" style="margin-left:8px">縦書き：</span>
      <button class="setting-btn" id="vertical-toggle">OFF</button>
    </div>

    <div id="chapter-content">
      <div class="loading">
        <div class="loading-spinner"></div>
        読み込み中...
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">小説リーダー</footer>

<script src="js/app.js"></script>
<script>
  loadChapter();
</script>
</body>
</html>
